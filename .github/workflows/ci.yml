name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DPEEP_BUILD_EXAMPLES=ON
          -DPEEP_BUILD_TESTS=ON
          -DPEEP_FETCH_GTEST=ON
          -DPEEP_BUILD_BENCH=ON

      - name: Build
        run: cmake --build build --config Debug --parallel

      - name: Test
        run: ctest --test-dir build -C Debug --output-on-failure

      - name: Install
        run: cmake --install build --config Debug --prefix "${{ runner.temp }}/peep-install"

      - name: Configure package smoke test
        run: >
          cmake -S tests/package_smoke -B "${{ runner.temp }}/peep-smoke"
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_PREFIX_PATH="${{ runner.temp }}/peep-install"

      - name: Build package smoke test
        run: cmake --build "${{ runner.temp }}/peep-smoke" --config Debug --parallel

      - name: Run package smoke test
        run: ctest --test-dir "${{ runner.temp }}/peep-smoke" -C Debug --output-on-failure

  release:
    name: release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure Release
        run: cmake --preset release

      - name: Build Release
        run: cmake --build --preset release --parallel

      - name: Test Release
        run: ctest --preset release

      - name: Install Release
        run: cmake --install build/release --prefix "${{ runner.temp }}/peep-release-install"

      - name: Configure Release package smoke test
        run: >
          cmake -S tests/package_smoke -B "${{ runner.temp }}/peep-release-smoke"
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_PREFIX_PATH="${{ runner.temp }}/peep-release-install"

      - name: Build Release package smoke test
        run: cmake --build "${{ runner.temp }}/peep-release-smoke" --parallel

      - name: Run Release package smoke test
        run: ctest --test-dir "${{ runner.temp }}/peep-release-smoke" --output-on-failure

  sanitize:
    name: asan-ubsan
    runs-on: ubuntu-latest

    env:
      ASAN_OPTIONS: detect_leaks=1
      UBSAN_OPTIONS: print_stacktrace=1

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure sanitizers
        run: cmake --preset sanitize

      - name: Build sanitizers
        run: cmake --build --preset sanitize --parallel

      - name: Test sanitizers
        run: ctest --preset sanitize

  coverage:
    name: coverage
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install coverage tools
        run: python3 -m pip install --user gcovr

      - name: Configure coverage build
        run: cmake --preset coverage

      - name: Build coverage target
        run: cmake --build --preset coverage --parallel

      - name: Test coverage build
        run: ctest --preset coverage

      - name: Generate coverage report
        run: >
          gcovr
          --root .
          --filter include/peep
          --xml-pretty
          --output coverage.xml

      - name: Upload coverage report
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false
          verbose: true
